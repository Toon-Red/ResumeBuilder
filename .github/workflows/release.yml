name: Build & Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller pythonnet pywin32
      - name: Set version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          printf '__version__ = "%s"\nDEV_MODE = False\n' "$VERSION" > version.py
      - name: Build exe
        run: |
          cp config.example.json config.json
          pyinstaller --onefile --name ResumeBuilder --noconsole --add-data "frontend;frontend" --add-data "data;data" --add-data "config.json;." --hidden-import server --hidden-import server.api --hidden-import server.models --hidden-import server.storage --hidden-import server.importer --hidden-import server.compiler --hidden-import server.repertoire --hidden-import server.active --hidden-import server.versioning --hidden-import server.jd_analyzer --hidden-import server.jd_scraper --hidden-import server.jd_routes launcher.py
      - name: Smoke test
        shell: bash
        run: |
          cp config.example.json config.json
          ./dist/ResumeBuilder.exe --server-only &
          EXE_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $EXE_PID 2>/dev/null; then echo "FAIL: died"; exit 1; fi
            RESP=$(curl -s http://127.0.0.1:5050/api/health 2>/dev/null || true)
            if echo "$RESP" | grep -q '"status":"ok"'; then
              echo "OK: $RESP"; kill $EXE_PID 2>/dev/null; exit 0
            fi
            sleep 1
          done
          echo "FAIL: no response"; kill $EXE_PID 2>/dev/null; exit 1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/ResumeBuilder.exe
          generate_release_notes: true
