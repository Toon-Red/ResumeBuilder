name: Tests
on:
  push:
    branches: [master]
    paths:
      - '**.py'
      - '**.js'
      - '**.html'
      - '**.css'
      - 'requirements.txt'
      - 'build.spec'
      - 'pipeline.json'
      - 'version_info.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - '**.py'
      - '**.js'
      - '**.html'
      - '**.css'
      - 'requirements.txt'
      - 'build.spec'
      - 'pipeline.json'
      - 'version_info.txt'
      - '.github/workflows/**'
jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7
